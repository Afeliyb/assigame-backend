# Connexion à PostgreSQL. Ces 3 valeurs sont celles utilisées en LOCAL par défaut.
# En production sur Render, vous les écraserez avec les variables d'environnement
# SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
# (Spring Boot les reconnaît automatiquement, aucune modification de code nécessaire).
spring.datasource.url=jdbc:postgresql://localhost:5432/assigame
spring.datasource.username=postgres
spring.datasource.password=postgres

# Port d'écoute du serveur. Render impose son propre port via la variable PORT.
server.port=${PORT:8081}

# Driver PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Permet à Jackson de sérialiser les entités (avec leurs relations chargées en LAZY) pendant
# toute la durée de la requête HTTP, sans erreur LazyInitializationException.
spring.jpa.open-in-view=true

# Upload des images (produits, avatars) : dossier local + URL de base utilisée pour construire
# les liens publics renvoyés au frontend (UploadController).
# En production, définissez APP_BASE_URL avec l'URL publique de votre backend
# (ex: https://assigame-backend.onrender.com).
app.upload.dir=uploads
app.base-url=${APP_BASE_URL:http://localhost:8081}

# URL publique du frontend, utilisée pour autoriser les requêtes CORS en production
# (ex: https://assigame.vercel.app). En local, le port 3000 est déjà autorisé par défaut.
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Taille maximale des fichiers envoyés via /api/upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB
